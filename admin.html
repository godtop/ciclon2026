<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Maratón Ciclón</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }

    header {
      background: #1a1d27;
      border-bottom: 2px solid #f7c229;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 1.2rem; color: #f7c229; }
    header span { font-size: 0.85rem; color: #888; }

    .toolbar {
      display: flex;
      gap: 10px;
      padding: 20px 24px 0;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn {
      padding: 8px 18px;
      border-radius: 20px;
      border: 2px solid #333;
      background: transparent;
      color: #aaa;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all .2s;
    }
    .filter-btn.active { border-color: #f7c229; color: #f7c229; background: rgba(247,194,41,.1); }
    .counter { margin-left: auto; font-size: 0.85rem; color: #666; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
      padding: 20px 24px;
    }

    .card {
      background: #1a1d27;
      border-radius: 12px;
      border: 1px solid #2a2d3a;
      overflow: hidden;
      transition: box-shadow .2s;
    }
    .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.4); }

    .card-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      background: #111;
      cursor: pointer;
    }
    .card-img-pdf {
      height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;
      font-size: 2.5rem;
      color: #555;
      cursor: pointer;
    }
    .card-img-pdf span { font-size: 0.75rem; margin-top: 8px; color: #666; }

    .card-body { padding: 14px 16px; }
    .runner-name { font-size: 1.05rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .runner-meta { font-size: 0.8rem; color: #888; margin-bottom: 10px; }
    .runner-meta b { color: #ccc; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .badge-pendiente  { background: rgba(251,191,36,.15); color: #fbbf24; border: 1px solid #fbbf24; }
    .badge-confirmado { background: rgba(34,197,94,.15);  color: #22c55e; border: 1px solid #22c55e; }
    .badge-rechazado  { background: rgba(239,68,68,.15);  color: #ef4444; border: 1px solid #ef4444; }

    .card-actions { display: flex; gap: 8px; padding: 0 16px 14px; }
    .btn-confirm {
      flex: 1;
      padding: 9px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
      transition: opacity .2s;
    }
    .btn-confirm:hover { opacity: .85; }
    .btn-confirm:disabled { opacity: .4; cursor: default; }

    .btn-reject {
      padding: 9px 14px;
      border-radius: 8px;
      border: 1px solid #555;
      background: transparent;
      color: #aaa;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all .2s;
    }
    .btn-reject:hover { border-color: #ef4444; color: #ef4444; }
    .btn-reject:disabled { opacity: .4; cursor: default; }

    .btn-view {
      padding: 9px 14px;
      border-radius: 8px;
      border: 1px solid #555;
      background: transparent;
      color: #aaa;
      cursor: pointer;
      font-size: 0.85rem;
      text-decoration: none;
      display: flex;
      align-items: center;
    }
    .btn-view:hover { border-color: #f7c229; color: #f7c229; }

    /* Modal imagen grande */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
    .modal-close-btn {
      position: fixed;
      top: 16px; right: 20px;
      background: #f7c229;
      border: none;
      color: #000;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
    }

    .empty { text-align: center; padding: 60px 20px; color: #555; font-size: 1rem; }
    .loading { text-align: center; padding: 60px; color: #555; }
    .error-msg { text-align: center; padding: 40px; color: #ef4444; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🏃 Admin – Maratón Ciclón Chivilcoy</h1>
    <span>Panel de inscripciones</span>
  </div>
</header>

<div class="toolbar">
  <button class="filter-btn active" onclick="setFilter('todos')">Todos</button>
  <button class="filter-btn" onclick="setFilter('pendiente')">⏳ Pendientes</button>
  <button class="filter-btn" onclick="setFilter('confirmado')">✅ Confirmados</button>
  <button class="filter-btn" onclick="setFilter('rechazado')">❌ Rechazados</button>
  <span class="counter" id="counter"></span>
</div>

<div class="grid" id="grid">
  <div class="loading">Cargando inscripciones...</div>
</div>

<!-- Modal imagen -->
<div class="modal-overlay" id="imgModal" onclick="closeModal()">
  <button class="modal-close-btn" onclick="closeModal()">✕ Cerrar</button>
  <img class="modal-img" id="modalImg" src="" alt="Comprobante">
</div>

<script>
  const API_URL = 'http://localhost:3001';
  let allInscripciones = [];
  let currentFilter = 'todos';

  async function loadInscripciones() {
    try {
      const res  = await fetch(`${API_URL}/inscripciones`);
      const data = await res.json();
      allInscripciones = data;
      render();
    } catch (e) {
      document.getElementById('grid').innerHTML = `<div class="error-msg">❌ No se pudo conectar al servidor. Verificá que el backend esté corriendo en ${API_URL}</div>`;
    }
  }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    render();
  }

  function render() {
    const items = currentFilter === 'todos'
      ? allInscripciones
      : allInscripciones.filter(i => i.estado === currentFilter);

    document.getElementById('counter').textContent = `${items.length} resultado${items.length !== 1 ? 's' : ''}`;

    if (!items.length) {
      document.getElementById('grid').innerHTML = `<div class="empty">No hay inscripciones para mostrar.</div>`;
      return;
    }

    document.getElementById('grid').innerHTML = items.map(i => cardHTML(i)).join('');
  }

  function cardHTML(i) {
    const isPdf = i.comprobanteUrl && i.comprobanteUrl.includes('.pdf');
    const fecha = new Date(i.createdAt).toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });

    const imgSection = isPdf
      ? `<div class="card-img-pdf" onclick="openModal('${i.comprobanteUrl}')">📄<span>${i.dni}.pdf</span></div>`
      : `<img class="card-img" src="${i.comprobanteUrl}" alt="Comprobante" onclick="openModal('${i.comprobanteUrl}')">`;

    const badgeClass = { pendiente: 'badge-pendiente', confirmado: 'badge-confirmado', rechazado: 'badge-rechazado' }[i.estado] || 'badge-pendiente';

    const canConfirm = i.estado !== 'confirmado';
    const canReject  = i.estado !== 'rechazado';

    return `
      <div class="card" id="card-${i.id}">
        ${imgSection}
        <div class="card-body">
          <div class="runner-name">${i.nombre} ${i.apellido}</div>
          <div class="runner-meta">
            DNI <b>${formatDni(i.dni)}</b> · ${i.edad} años · ${i.sexo}<br>
            ${i.carrera.toUpperCase()} · ${i.remera === 'con' ? `Talle ${i.talle}` : 'Sin remera'}<br>
            <b>$${i.monto.toLocaleString('es-AR')}</b> · ${i.email}<br>
            <small style="color:#555">${fecha}</small>
          </div>
          <span class="badge ${badgeClass}">${i.estado.toUpperCase()}</span>
        </div>
        <div class="card-actions">
          <button class="btn-confirm" onclick="confirmar(${i.id})" ${canConfirm ? '' : 'disabled'}>
            ${i.estado === 'confirmado' ? '✅ Confirmado' : 'Confirmar pago ✓'}
          </button>
          <button class="btn-reject" onclick="rechazar(${i.id})" ${canReject ? '' : 'disabled'} title="Rechazar">✕</button>
          <a class="btn-view" href="${i.comprobanteUrl}" target="_blank" title="Ver comprobante">🔍</a>
        </div>
      </div>
    `;
  }

  async function confirmar(id) {
    if (!confirm('¿Confirmar la inscripción de este corredor?')) return;
    try {
      const res = await fetch(`${API_URL}/inscripciones/${id}/confirmar`, { method: 'PATCH' });
      if (!res.ok) throw new Error();
      const found = allInscripciones.find(i => i.id === id);
      if (found) found.estado = 'confirmado';
      render();
    } catch {
      alert('Error al confirmar la inscripción.');
    }
  }

  async function rechazar(id) {
    if (!confirm('¿Rechazar esta inscripción?')) return;
    try {
      const res = await fetch(`${API_URL}/inscripciones/${id}/rechazar`, { method: 'PATCH' });
      if (!res.ok) throw new Error();
      const found = allInscripciones.find(i => i.id === id);
      if (found) found.estado = 'rechazado';
      render();
    } catch {
      alert('Error al rechazar la inscripción.');
    }
  }

  function openModal(url) {
    document.getElementById('modalImg').src = url;
    document.getElementById('imgModal').classList.add('open');
  }
  function closeModal() {
    document.getElementById('imgModal').classList.remove('open');
    document.getElementById('modalImg').src = '';
  }

  function formatDni(dni) {
    const c = String(dni).replace(/\D/g, '');
    if (c.length === 8) return c.replace(/(\d{2})(\d{3})(\d{3})/, '$1.$2.$3');
    if (c.length === 7) return c.replace(/(\d{1})(\d{3})(\d{3})/, '$1.$2.$3');
    return c;
  }

  loadInscripciones();
  // Auto-refresh cada 30s
  setInterval(loadInscripciones, 30000);
</script>
</body>
</html>
